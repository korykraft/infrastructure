---
- name: Create stripe instance directories
  ansible.builtin.file:
    path: "/home/{{ server_user }}/docker/stripe/{{ item.name }}"
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"
  loop: "{{ stripe_instances }}"

- name: Create stripe env files
  ansible.builtin.template:
    src: stripe.env.j2
    dest: "/home/{{ server_user }}/docker/stripe/{{ item.name }}/.env"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0600"
  loop: "{{ stripe_instances }}"

- name: Create stripe compose files
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/home/{{ server_user }}/docker/stripe/{{ item.name }}/docker-compose.yml"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0644"
  loop: "{{ stripe_instances }}"

- name: Start stripe listeners
  community.docker.docker_compose_v2:
    project_src: "/home/{{ server_user }}/docker/stripe/{{ item.name }}"
    state: present
  loop: "{{ stripe_instances }}"
  when: stripe_start_listener | default(true)

# ansible/roles/stripe/tasks/main.yml
- name: Test Stripe forward target connectivity
  ansible.builtin.import_tasks: test-connectivity.yml
  when: stripe_test_connectivity | default(false)
