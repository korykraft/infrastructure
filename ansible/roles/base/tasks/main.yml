---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - fish
      - git
      - curl
      - wget
      - jq
      - rsync
      - htop
      - ufw
      - openssh-server
      - sudo
      - yq
      - tree
      - ripgrep
      - fd-find
      - ca-certificates
      - gnupg
      - lsb-release
      - sudo
    state: present

- name: Create fd symlink
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link

- name: Ensure server user exists
  ansible.builtin.user:
    name: "{{ server_user }}"
    shell: /usr/bin/fish
    groups: sudo
    append: true
    create_home: true

- name: Ensure SSH service is enabled and running
  ansible.builtin.service:
    name: ssh
    state: started
    enabled: true

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny
  when: not (ansible_is_docker_test | default(false))

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow
  when: not (ansible_is_docker_test | default(false))

- name: Allow OpenSSH through UFW
  community.general.ufw:
    rule: allow
    name: OpenSSH
  when: not (ansible_is_docker_test | default(false))

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: not (ansible_is_docker_test | default(false))

- name: Install GitHub CLI
  ansible.builtin.import_tasks: github-cli.yml
